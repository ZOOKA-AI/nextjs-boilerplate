<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Random Joke Generator</title>
  <style>
    body { font-family: system-ui, Arial; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f6f8fa; }
    .card { background:white; padding:24px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08); width:90%; max-width:600px; text-align:center; }
    button { padding:10px 16px; font-size:16px; border-radius:6px; cursor:pointer; }
    #joke { margin:18px 0; font-size:18px; color:#222; min-height:48px; }
    #setup { font-weight:600; }
    #delivery { margin-top:8px; color:#555; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Random Joke Generator</h2>
    <div id="joke">
      <div id="setup"></div>
      <div id="delivery"></div>
    </div>
    <div>
      <button id="newJoke">Get a joke</button>
      <label style="margin-left:12px">
        <input type="checkbox" id="nsfw" /> Allow offensive
      </label>
    </div>
    <p style="margin-top:12px;color:#666;font-size:13px">Source: <a href="https://v2.jokeapi.dev" target="_blank" rel="noopener">JokeAPI</a></p>
  </div>

  <script>
    const setupEl = document.getElementById('setup');
    const deliveryEl = document.getElementById('delivery');
    const btn = document.getElementById('newJoke');
    const nsfwCheckbox = document.getElementById('nsfw');

    async function fetchJoke() {
      setupEl.textContent = 'Loading...';
      deliveryEl.textContent = '';
      const blacklist = nsfwCheckbox.checked ? '' : '&blacklistFlags=nsfw,religious,political,racist,sexist';
      const url = 'https://v2.jokeapi.dev/joke/Any?type=single,twopart' + blacklist + '&idRange=0-10000';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        if (data.type === 'single') {
          setupEl.textContent = data.joke;
          deliveryEl.textContent = '';
        } else if (data.type === 'twopart') {
          setupEl.textContent = data.setup;
          deliveryEl.textContent = data.delivery;
        } else {
          setupEl.textContent = 'No joke received.';
          deliveryEl.textContent = '';
        }
      } catch (err) {
        setupEl.textContent = 'Failed to load a joke 😕';
        deliveryEl.textContent = String(err);
      }
    }

    btn.addEventListener('click', fetchJoke);
    fetchJoke();
  </script>
</body>
</html>
